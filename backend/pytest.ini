[pytest]
asyncio_mode = auto
addopts = -ra --strict-markers
markers =
    unit: pruebas unitarias
    integration: pruebas de integracion entre modulos/servicios
    system: pruebas de sistema end-to-end de flujos completos
    acceptance: pruebas de aceptacion contra criterios funcionales
    property: pruebas basadas en propiedades (Hypothesis)